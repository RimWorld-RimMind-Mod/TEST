name: Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'V[0-9]+.[0-9]+.[0-9]+*'

  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.2.3，不要加 v)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean
      notes_extra:
        description: '补充说明 (追加到 Release Notes 末尾)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read
  actions: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare:
    name: Prepare Release Data
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      mod_name: ${{ steps.info.outputs.mod_name }}
      mod_name_safe: ${{ steps.info.outputs.mod_name_safe }}
      is_prerelease: ${{ steps.info.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Info
        id: info
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            TAG="${{ github.ref_name }}"
            if echo "$TAG" | grep -qiE 'alpha|beta|rc|preview'; then
              PRE="true"
            else
              PRE="false"
            fi
          else
            TAG="v${{ github.event.inputs.version }}"
            PRE="${{ github.event.inputs.prerelease }}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$PRE" >> $GITHUB_OUTPUT

          if [ -f "About/About.xml" ]; then
            MOD_NAME=$(grep -oP '(?<=<name>)[^<]+' About/About.xml | head -1)
            SAFE_NAME=$(echo "$MOD_NAME" | sed 's/[[:space:]]/-/g; s/[^a-zA-Z0-9._-]//g')
          else
            MOD_NAME="${{ github.event.repository.name }}"
            SAFE_NAME="$MOD_NAME"
          fi
          echo "mod_name=$MOD_NAME" >> $GITHUB_OUTPUT
          echo "mod_name_safe=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Collect Commits Since Last Tag
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")

          if [ -z "$PREV" ]; then
            echo "未找到上一个 tag，收集全部提交历史"
            git log --pretty=format:"%s" > /tmp/commits.txt
          else
            echo "收集范围: $PREV .. $TAG"
            git log "$PREV..$TAG" --pretty=format:"%s" > /tmp/commits.txt
          fi

          echo "共 $(wc -l < /tmp/commits.txt) 条 commits"

      - name: Collect PRs
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.info.outputs.tag }}';
            const { data: tagData } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`
            });
            const commitSha = tagData.object.sha;
            const { data: commitData } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha
            });
            const tagDate = new Date(commitData.committer.date);

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });

            const mergedPRs = [];
            for (const pr of pulls) {
              if (!pr.merged_at) continue;
              if (new Date(pr.merged_at) > tagDate) continue;

              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });

              mergedPRs.push({
                number: pr.number,
                title: pr.title,
                body: pr.body,
                author: pr.user.login,
                merged_at: pr.merged_at,
                labels: pr.labels.map(l => l.name),
                files: files.map(f => ({
                  path: f.filename,
                  changeType: f.status
                }))
              });
            }

            mergedPRs.sort((a, b) => new Date(a.merged_at) - new Date(b.merged_at));
            console.log(`收集到 ${mergedPRs.length} 个已合并 PR（在 ${tagDate.toISOString()} 之前）`);

            const fs = require('fs');
            fs.writeFileSync('/tmp/prs.json', JSON.stringify(mergedPRs, null, 2));

      - name: Upload Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-data
          path: |
            /tmp/commits.txt
            /tmp/prs.json
          retention-days: 1

  generate-notes:
    name: AI Generate Notes
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        uses: actions/download-artifact@v4
        with:
          name: release-data
          path: /tmp

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: pip install openai

      - name: Generate Release Notes
        id: gen
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
        run: |
          python .github/scripts/analyze_release.py \
            --mod-name "${{ needs.prepare.outputs.mod_name }}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --commits-file /tmp/commits.txt \
            --prs-file /tmp/prs.json \
            --output-file /tmp/notes.md

      - name: Upload Notes Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/notes.md
          retention-days: 1

  release:
    name: Create Release & Package
    needs: [prepare, generate-notes]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp

      - name: Update About.xml Version
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VER="${TAG#v}"
          if [ -f "About/About.xml" ]; then
            sed -i "s|<modVersion>[^<]*</modVersion>|<modVersion>${VER}</modVersion>|g" About/About.xml
            echo "已更新 About.xml 版本号为: $VER"
          fi

      - name: Commit Version Update
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "没有变更需要提交"
          else
            git add About/About.xml
            git commit -m "chore: release ${{ needs.prepare.outputs.tag }}"
            git push
          fi

      - name: Package Mod
        run: |
          MOD="${{ needs.prepare.outputs.mod_name_safe }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          mkdir -p "/tmp/${MOD}"

          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='Source/' \
            --exclude='Tests/' \
            --exclude='script/' \
            --exclude='.claude/' \
            --exclude='.trae/' \
            --exclude='docs/' \
            --exclude='*.csproj' \
            --exclude='*.sln' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='*.md' \
            "./" "/tmp/${MOD}/"

          cd /tmp
          zip -r "${MOD}-${TAG}.zip" "${MOD}/"
          echo "打包完成: ${MOD}-${TAG}.zip"

      - name: Prepare Final Notes
        run: |
          cp /tmp/notes.md /tmp/final_notes.md
          if [ -n "${{ github.event.inputs.notes_extra }}" ]; then
            echo "" >> /tmp/final_notes.md
            echo "---" >> /tmp/final_notes.md
            echo "" >> /tmp/final_notes.md
            echo "## 补充说明" >> /tmp/final_notes.md
            echo "${{ github.event.inputs.notes_extra }}" >> /tmp/final_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.mod_name }} ${{ needs.prepare.outputs.tag }}
          body_path: /tmp/final_notes.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: /tmp/${{ needs.prepare.outputs.mod_name_safe }}-${{ needs.prepare.outputs.tag }}.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Steam Upload
        if: ${{ needs.prepare.outputs.is_prerelease != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'steam-upload.yml',
                ref: 'main',
                inputs: {
                  release_tag: '${{ needs.prepare.outputs.tag }}'
                }
              });
              console.log('Steam 上传工作流已触发');
            } catch (e) {
              if (e.status === 404) {
                console.log('未找到 steam-upload.yml，跳过 Steam 触发');
              } else {
                throw e;
              }
            }
