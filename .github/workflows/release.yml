name: Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'V[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.2.3，不要加 v)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean
      notes_extra:
        description: '补充说明 (追加到 Release Notes 末尾)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read
  actions: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare:
    name: Prepare Release Data
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      mod_name: ${{ steps.info.outputs.mod_name }}
      mod_name_safe: ${{ steps.info.outputs.mod_name_safe }}
      is_prerelease: ${{ steps.info.outputs.is_prerelease }}
      base_ref: ${{ steps.git-range.outputs.base }} # 输出上一个 Tag
      head_ref: ${{ steps.git-range.outputs.head }} # 输出当前 Tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取全部历史

      - name: Determine Version Info
        id: info
        run: |
          # ... (保持你原来的逻辑不变) ...
          if [ "${{ github.event_name }}" == "push" ]; then
            TAG="${{ github.ref_name }}"
            if echo "$TAG" | grep -qiE 'alpha|beta|rc|preview'; then PRE="true"; else PRE="false"; fi
          else
            TAG="v${{ github.event.inputs.version }}"
            PRE="${{ github.event.inputs.prerelease }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$PRE" >> $GITHUB_OUTPUT
          # ... (Mod Name 逻辑保持不变) ...
          if [ -f "About/About.xml" ]; then
            MOD_NAME=$(grep -oP '(?<=<name>)[^<]+' About/About.xml | head -1)
            SAFE_NAME=$(echo "$MOD_NAME" | sed 's/[[:space:]]/-/g; s/[^a-zA-Z0-9._-]//g')
          else
            MOD_NAME="${{ github.event.repository.name }}"
            SAFE_NAME="$MOD_NAME"
          fi
          echo "mod_name=$MOD_NAME" >> $GITHUB_OUTPUT
          echo "mod_name_safe=$SAFE_NAME" >> $GITHUB_OUTPUT

      # [新增] 关键步骤：精准确定 Git 对比范围
      - name: Determine Git Diff Range
        id: git-range
        run: |
          CURRENT_TAG="${{ steps.info.outputs.tag }}"
          
          # 尝试找到上一个 Tag
          # git describe 会找到当前 commit 之前最近的一个 tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "base=" >> $GITHUB_OUTPUT
            echo "head=$CURRENT_TAG" >> $GITHUB_OUTPUT
            echo "::notice:: 未找到上一个 Tag，将对比全部历史"
          else
            echo "base=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
            echo "head=$CURRENT_TAG" >> $GITHUB_OUTPUT
            echo "::notice:: 确定对比范围: ${PREVIOUS_TAG}...${CURRENT_TAG}"
          fi

      # [增强] 收集 Commits 并打印详情
      - name: Collect Commits
        run: |
          BASE="${{ steps.git-range.outputs.base }}"
          HEAD="${{ steps.git-range.outputs.head }}"
          
          if [ -z "$BASE" ]; then
            echo "### 收集全部 Commits (首次发布) ###"
            git log --pretty=format:"* %h - %s" $HEAD > /tmp/commits.txt
          else
            echo "### 收集范围: $BASE 到 $HEAD ###"
            git log --pretty=format:"* %h - %s" ${BASE}..${HEAD} > /tmp/commits.txt
          fi
          
          # 【Debug 输出】直接把 Commit 列表打印到 Action 日志
          echo "=================== Commits 列表 ==================="
          cat /tmp/commits.txt
          echo "===================================================="

      # [重写] 精准收集 PR：不再看时间，只看 Git 记录
      - name: Collect PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: compare } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: '${{ steps.git-range.outputs.base }}' || context.sha, // 如果没 base，用这个糊弄一下，主要逻辑在下面判断
              head: '${{ steps.git-range.outputs.head }}'
            });

            console.log(`::group::[Debug] GitHub API Compare 原始数据`);
            console.log(`共 ${compare.commits.length} 个 commits 在范围内`);
            
            const prNumbers = new Set();
            const prDetails = [];

            // 1. 遍历这个范围内的所有 Commit
            for (const commit of compare.commits) {
              // 检查 Commit 信息中是否关联了 PR (GitHub 会在 merge commit 信息里自动加 PR 号)
              // 也可以检查 commit.message 里的 #123
              const message = commit.commit.message;
              const match = message.match(/\(\#(\d+)\)$/); // 匹配 "fix bug (#123)" 这种标准格式
              
              if (match) {
                prNumbers.add(parseInt(match[1]));
              }
            }

            console.log(`从 Commit 信息中提取到 PR 号: ${[...prNumbers]}`);
            console.log(`::endgroup::`);

            // 2. 获取这些 PR 的详细详情
            for (const num of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: num
              });
              
              console.log(`::group::[Debug] 获取 PR #${num} 详情`);
              console.log(`标题: ${pr.title}`);
              console.log(`Body: ${pr.body}`);
              console.log(`::endgroup::`);

              prDetails.push({
                number: pr.number,
                title: pr.title,
                body: pr.body,
                author: pr.user.login,
                labels: pr.labels.map(l => l.name)
              });
            }

            // 3. 保存文件
            const fs = require('fs');
            fs.writeFileSync('/tmp/prs.json', JSON.stringify(prDetails, null, 2));
            
            console.log("::notice:: 最终收集到的 PR 数据已写入 prs.json");

      - name: Upload Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-data
          path: |
            /tmp/commits.txt
            /tmp/prs.json
          retention-days: 1

  generate-notes:
    name: AI Generate Notes
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        uses: actions/download-artifact@v4
        with:
          name: release-data
          path: /tmp

      # [新增] 调试步骤：在运行脚本前，再次确认文件内容
      - name: 🔍 Debug: Show Input Data
        run: |
          echo ">>>>>>>>>>>>>>>>>>>>>> Commits <<<<<<<<<<<<<<<<<<"
          cat /tmp/commits.txt
          echo ""
          echo ">>>>>>>>>>>>>>>>>>>>>> PRs JSON <<<<<<<<<<<<<<<<<<"
          cat /tmp/prs.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: pip install openai

      - name: Generate Release Notes
        id: gen
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: |
          python .github/scripts/analyze_release.py \
            --mod-name "${{ needs.prepare.outputs.mod_name }}" \
            --current-version "${{ needs.prepare.outputs.tag }}" \
            --prs-file /tmp/prs.json \
            --commits-txt /tmp/commits.txt

      - name: Upload Notes Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release_notes.md

  release:
    name: Create Release & Package
    needs: [prepare, generate-notes]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp

      - name: Update About.xml Version
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VER="${TAG#v}"
          if [ -f "About/About.xml" ]; then
            sed -i "s|<modVersion>[^<]*</modVersion>|<modVersion>${VER}</modVersion>|g" About/About.xml
            echo "已更新 About.xml 版本号为: $VER"
          fi

      - name: Commit Version Update
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "没有变更需要提交"
          else
            git add About/About.xml
            git commit -m "chore: release ${{ needs.prepare.outputs.tag }}"
            git push
          fi

      - name: Package Mod
        run: |
          MOD="${{ needs.prepare.outputs.mod_name_safe }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          mkdir -p "/tmp/${MOD}"

          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='Source/' \
            --exclude='Tests/' \
            --exclude='script/' \
            --exclude='.claude/' \
            --exclude='.trae/' \
            --exclude='docs/' \
            --exclude='*.csproj' \
            --exclude='*.sln' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='*.md' \
            "./" "/tmp/${MOD}/"

          cd /tmp
          zip -r "${MOD}-${TAG}.zip" "${MOD}/"
          echo "打包完成: ${MOD}-${TAG}.zip"

      - name: Prepare Final Notes
        run: |
          cp /tmp/release_notes.md /tmp/final_notes.md
          if [ -n "${{ github.event.inputs.notes_extra }}" ]; then
            echo "" >> /tmp/final_notes.md
            echo "---" >> /tmp/final_notes.md
            echo "" >> /tmp/final_notes.md
            echo "## 补充说明" >> /tmp/final_notes.md
            echo "${{ github.event.inputs.notes_extra }}" >> /tmp/final_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.mod_name }} ${{ needs.prepare.outputs.tag }}
          body_path: /tmp/final_notes.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: /tmp/${{ needs.prepare.outputs.mod_name_safe }}-${{ needs.prepare.outputs.tag }}.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Steam Upload
        if: ${{ needs.prepare.outputs.is_prerelease != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'steam-upload.yml',
                ref: 'main',
                inputs: {
                  release_tag: '${{ needs.prepare.outputs.tag }}'
                }
              });
              console.log('Steam 上传工作流已触发');
            } catch (e) {
              if (e.status === 404) {
                console.log('未找到 steam-upload.yml，跳过 Steam 触发');
              } else {
                throw e;
              }
            }
